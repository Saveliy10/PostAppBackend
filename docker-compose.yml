version: '3.9'

services:
    postgres:
        container_name: post-service # Изменил, чтобы не конфликтовало с postgres2
        image: postgres:15
        restart: always
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DATABASE}
        ports:
            - '${POSTGRES_PORT}:5432' # Берем порт из .env (5433)
        volumes:
            - post-service-postgres-data:/var/lib/postgresql/data # Уникальное имя volume и ПРАВИЛЬНЫЙ путь
        networks:
            - post-service-network # Уникальное имя сети

volumes:
    post-service-postgres-data: # Уникальное имя volume

networks:
    post-service-network: # Уникальное имя сети
